<!DOCTYPE html>

<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>P&L Simulator — 2026.03.18</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060f;--panel:#0c0c1d;--card:#111128;--border:#1e1e3a;--accent:#818cf8;--text:#e2e8f0;--sub:#94a3b8;--put:#f87171;--call:#60a5fa;--atm:#fbbf24;--up:#4ade80;--down:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:"Noto Sans JP",sans-serif;font-size:13px;line-height:1.6}
.mono{font-family:"DM Mono",monospace}
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,6,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar .logo{font-family:Outfit;font-weight:700;font-size:15px;color:var(--accent)}.topbar .sub{font-size:10px;color:var(--sub);margin-left:8px}.topbar nav a{color:var(--sub);text-decoration:none;font-size:12px;margin-left:16px;font-family:Outfit}
.container{max-width:1000px;margin:0 auto;padding:16px}
.kpi-strip{display:flex;gap:16px;flex-wrap:wrap;margin:12px 0;justify-content:center}
.kpi{text-align:center;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;min-width:120px}.kpi .label{font-size:10px;color:var(--sub);font-family:Outfit}.kpi .val{font-family:"DM Mono";font-size:16px;color:#fff}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0}
.preset-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 12px;color:var(--sub);cursor:pointer;font-size:11px;font-family:Outfit}
.preset-btn:hover{border-color:var(--accent);color:var(--accent)}
.leg-row{display:flex;gap:6px;align-items:center;margin:4px 0;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px}
.leg-row select,.leg-row input{background:var(--panel);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 6px;font-size:11px;font-family:"DM Mono"}
.leg-row select{width:70px}.leg-row input{width:80px}
.leg-label{font-size:10px;color:var(--sub);font-family:Outfit;width:50px}
.btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:11px;font-family:Outfit;font-weight:600}.btn:hover{opacity:.9}
.btn-del{background:transparent;border:1px solid var(--border);color:var(--down);cursor:pointer;border-radius:4px;padding:2px 6px;font-size:10px}
.result-strip{display:flex;gap:12px;flex-wrap:wrap;margin:16px 0}
.result-item{flex:1;min-width:120px;background:var(--card);border-radius:8px;padding:10px;text-align:center;border:1px solid var(--border)}.result-item .r-label{font-size:10px;color:var(--sub);font-family:Outfit}.result-item .r-val{font-family:"DM Mono";font-size:18px;font-weight:500;margin-top:2px}
.pnl-tbl{width:100%;border-collapse:collapse;font-size:11px;margin:12px 0}.pnl-tbl th{background:rgba(255,255,255,.04);padding:5px 6px;text-align:right;font-family:Outfit;font-weight:500;color:var(--sub);border-bottom:1px solid var(--border)}.pnl-tbl td{padding:4px 6px;border-bottom:1px solid rgba(255,255,255,.03);font-family:"DM Mono";text-align:right}.pnl-tbl tr:hover{background:rgba(255,255,255,.02)}.pnl-tbl .atm-row{background:rgba(251,191,36,.06)}
.bar-cell{position:relative;width:120px}.bar-inner{height:12px;position:absolute;top:50%;transform:translateY(-50%)}.bar-pos{background:var(--up);left:50%;border-radius:0 2px 2px 0}.bar-neg{background:var(--down);right:50%;border-radius:2px 0 0 2px}
canvas{display:block;margin:12px auto;border-radius:8px;background:var(--card);border:1px solid var(--border)}
.section-title{font-family:Outfit;font-size:13px;font-weight:600;color:var(--accent);margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.insight{background:rgba(129,140,248,.08);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 14px;margin:10px 0;font-size:12px;color:var(--sub)}
.footer{text-align:center;padding:20px;color:var(--sub);font-size:11px;border-top:1px solid var(--border);margin-top:20px}.footer a{color:var(--accent);text-decoration:none;margin:0 8px}
</style></head><body>
<div class="topbar"><div><span class="logo">P&L Simulator</span><span class="sub mono">2026.03.18 | ATM 54,910 | VI 33.00 | SQ 6/12 (62d)</span></div><nav><a href="index.html">&larr; Dashboard</a><a href="archive.html">Archive</a></nav></div>
<div class="container">
<div class="kpi-strip">
<div class="kpi"><div class="label">ATM</div><div class="val mono">54,910</div></div>
<div class="kpi"><div class="label">VI</div><div class="val mono">33.00</div></div>
<div class="kpi"><div class="label">SQ</div><div class="val mono">6/12</div></div>
<div class="kpi"><div class="label">T (days)</div><div class="val mono">62</div></div>
</div>
<div class="section-title">Preset Strategies</div>
<div class="presets" id="presets"></div>
<div class="section-title">Leg Builder</div>
<div style="display:flex;gap:6px;margin:8px 0">
<button class="btn" id="addPut">+ Put</button>
<button class="btn" id="addCall">+ Call</button>
<button class="btn" id="addFut">+ Futures mini</button>
<button class="btn" style="background:transparent;border:1px solid var(--border);color:var(--down)" id="clearLegs">Clear</button>
</div>
<div id="legs"></div>
<div class="section-title">Results</div>
<div class="result-strip" id="results"></div>
<canvas id="chart" width="960" height="320"></canvas>
<div id="pnlTable"></div>
<div class="insight" id="insightBox"></div>
</div>
<div class="footer"><a href="index.html">Dashboard</a><a href="archive.html">Archive</a><br>BS premiums are estimates. Override with actual prices.</div>
<script>
(function(){
var ATM=54910,VI=33,T=62/250,SIG=0.33;
var legs=[];
var legId=0;
function ncdf(x){if(x<0)return 1-ncdf(-x);var t=1/(1+0.2316419*x);var d=0.3989422804014327;var p=t*(0.31938153+t*(-0.35656378+t*(1.7814779+t*(-1.8212560+t*1.3302744))));return 1-d*Math.exp(-0.5*x*x)*p;}
function bsPrice(type,K,F,sig,t){if(t<=0)return type==="put"?Math.max(K-F,0):Math.max(F-K,0);var st=sig*Math.sqrt(t);var d1=(Math.log(F/K)+0.5*sig*sig*t)/st;var d2=d1-st;if(type==="put")return K*ncdf(-d2)-F*ncdf(-d1);return F*ncdf(d1)-K*ncdf(d2);}
var presets=[
{name:"Iron Condor",legs:[{t:"put",sd:"Short",k:52000,m:1000},{t:"put",sd:"Long",k:50000,m:1000},{t:"call",sd:"Short",k:58000,m:1000},{t:"call",sd:"Long",k:60000,m:1000}]},
{name:"Put Credit Spread",legs:[{t:"put",sd:"Short",k:52000,m:1000},{t:"put",sd:"Long",k:50000,m:1000}]},
{name:"Call Credit Spread",legs:[{t:"call",sd:"Short",k:58000,m:1000},{t:"call",sd:"Long",k:60000,m:1000}]},
{name:"Short Strangle",legs:[{t:"put",sd:"Short",k:52000,m:1000},{t:"call",sd:"Short",k:58000,m:1000}]},
{name:"P Sell+Hedge",legs:[{t:"put",sd:"Short",k:52000,m:1000},{t:"fut",sd:"Short",k:54910,m:100}]},
{name:"Mini Weekly \u03b8",legs:[{t:"put",sd:"Short",k:52500,m:100},{t:"call",sd:"Short",k:57000,m:100}]}
];
var pDiv=document.getElementById("presets");
for(var i=0;i<presets.length;i++){
  var b=document.createElement("button");b.className="preset-btn";b.textContent=presets[i].name;b.setAttribute("data-pi",i);pDiv.appendChild(b);
}
pDiv.addEventListener("click",function(e){
  var pi=e.target.getAttribute("data-pi");if(pi===null)return;
  legs=[];legId=0;var p=presets[parseInt(pi)];
  for(var i=0;i<p.legs.length;i++){var l=p.legs[i];var prem=0;
    if(l.t!=="fut")prem=Math.round(bsPrice(l.t,l.k,ATM,SIG,T));
    legs.push({id:legId++,type:l.t,side:l.sd,strike:l.k,prem:prem,qty:1,mult:l.m});}
  renderLegs();calc();
});
function addLeg(type){
  var k=type==="fut"?ATM:(type==="put"?ATM-2000:ATM+2000);
  k=Math.round(k/500)*500;
  var m=type==="fut"?100:1000;
  var prem=type==="fut"?0:Math.round(bsPrice(type,k,ATM,SIG,T));
  legs.push({id:legId++,type:type,side:"Short",strike:k,prem:prem,qty:1,mult:m});
  renderLegs();calc();
}
document.getElementById("addPut").addEventListener("click",function(){addLeg("put");});
document.getElementById("addCall").addEventListener("click",function(){addLeg("call");});
document.getElementById("addFut").addEventListener("click",function(){addLeg("fut");});
document.getElementById("clearLegs").addEventListener("click",function(){legs=[];legId=0;renderLegs();clearResults();});
function renderLegs(){
  var c=document.getElementById("legs");c.innerHTML="";
  for(var i=0;i<legs.length;i++){
    var l=legs[i];var d=document.createElement("div");d.className="leg-row";
    var typeLabel=l.type==="put"?"PUT":l.type==="call"?"CALL":"FUT";
    var typeColor=l.type==="put"?"var(--put)":l.type==="call"?"var(--call)":"var(--atm)";
    var inner="<span style=\"color:"+typeColor+";font-weight:600;width:40px;font-family:Outfit\">"+typeLabel+"</span>";
    inner+="<select data-idx=\""+i+"\" data-field=\"side\"><option"+(l.side==="Short"?" selected":"")+">Short</option><option"+(l.side==="Long"?" selected":"")+">Long</option></select>";
    inner+="<span class=\"leg-label\">K:</span><input type=\"number\" step=\"500\" value=\""+l.strike+"\" data-idx=\""+i+"\" data-field=\"strike\">";
    if(l.type!=="fut"){inner+="<span class=\"leg-label\">Prem:</span><input type=\"number\" value=\""+l.prem+"\" data-idx=\""+i+"\" data-field=\"prem\">";}
    inner+="<span class=\"leg-label\">Qty:</span><input type=\"number\" min=\"1\" value=\""+l.qty+"\" data-idx=\""+i+"\" data-field=\"qty\" style=\"width:50px\">";
    inner+="<select data-idx=\""+i+"\" data-field=\"mult\"><option value=\"1000\""+(l.mult===1000?" selected":"")+">L(x1000)</option><option value=\"100\""+(l.mult===100?" selected":"")+">m(x100)</option></select>";
    inner+="<button class=\"btn-del\" data-delidx=\""+i+"\">\u2715</button>";
    d.innerHTML=inner;c.appendChild(d);
  }
}
document.getElementById("legs").addEventListener("change",function(e){
  var idx=e.target.getAttribute("data-idx");var field=e.target.getAttribute("data-field");
  if(idx===null||field===null)return;idx=parseInt(idx);
  var l=legs[idx];if(!l)return;
  if(field==="side")l.side=e.target.value;
  else if(field==="strike"){l.strike=parseInt(e.target.value);if(l.type!=="fut")l.prem=Math.round(bsPrice(l.type,l.strike,ATM,SIG,T));}
  else if(field==="prem")l.prem=parseInt(e.target.value);
  else if(field==="qty")l.qty=parseInt(e.target.value)||1;
  else if(field==="mult")l.mult=parseInt(e.target.value);
  if(field==="strike")renderLegs();
  calc();
});
document.getElementById("legs").addEventListener("click",function(e){
  var di=e.target.getAttribute("data-delidx");if(di===null)return;
  legs.splice(parseInt(di),1);renderLegs();calc();
});
function clearResults(){document.getElementById("results").innerHTML="";document.getElementById("pnlTable").innerHTML="";document.getElementById("insightBox").innerHTML="";var cv=document.getElementById("chart");var cx=cv.getContext("2d");cx.clearRect(0,0,cv.width,cv.height);}
function calc(){
  if(legs.length===0){clearResults();return;}
  var sqList=[];for(var s=ATM-6000;s<=ATM+6000;s+=500)sqList.push(s);
  var pnlArr=[];var maxP=-Infinity,minP=Infinity;
  for(var si=0;si<sqList.length;si++){
    var sq=sqList[si];var total=0;var legPnls=[];
    for(var li=0;li<legs.length;li++){
      var l=legs[li];var pnl=0;
      if(l.type==="put"){var intrinsic=Math.max(l.strike-sq,0);pnl=l.side==="Short"?l.prem-intrinsic:intrinsic-l.prem;}
      else if(l.type==="call"){var intrinsic=Math.max(sq-l.strike,0);pnl=l.side==="Short"?l.prem-intrinsic:intrinsic-l.prem;}
      else{pnl=l.side==="Short"?l.strike-sq:sq-l.strike;}
      var pnlYen=pnl*l.qty*l.mult;legPnls.push(pnl*l.qty);total+=pnlYen;
    }
    pnlArr.push({sq:sq,legPnls:legPnls,total:total});
    if(total>maxP)maxP=total;if(total<minP)minP=total;
  }
  var beven=[];for(var i=1;i<pnlArr.length;i++){if((pnlArr[i-1].total<=0&&pnlArr[i].total>=0)||(pnlArr[i-1].total>=0&&pnlArr[i].total<=0)){beven.push(pnlArr[i].sq);}}
  var rDiv=document.getElementById("results");rDiv.innerHTML="";
  var maxPStr=maxP>=1e6?(maxP/1e6).toFixed(1)+"M":maxP>=1e4?(maxP/1e4).toFixed(1)+"\u4e07":maxP.toLocaleString();
  var minPStr=minP<=-1e6?(minP/1e6).toFixed(1)+"M":minP<=-1e4?(minP/1e4).toFixed(1)+"\u4e07":minP.toLocaleString();
  rDiv.innerHTML="<div class=\"result-item\"><div class=\"r-label\">Max Profit</div><div class=\"r-val\" style=\"color:var(--up)\">"+maxPStr+"</div></div>"
  +"<div class=\"result-item\"><div class=\"r-label\">Max Loss</div><div class=\"r-val\" style=\"color:var(--down)\">"+minPStr+"</div></div>"
  +"<div class=\"result-item\"><div class=\"r-label\">Breakeven</div><div class=\"r-val\" style=\"color:var(--atm)\">"+(beven.length>0?beven.join(", "):"N/A")+"</div></div>";
  var cv=document.getElementById("chart");var cx=cv.getContext("2d");var W=cv.width,H=cv.height;
  cx.clearRect(0,0,W,H);cx.fillStyle="#111128";cx.fillRect(0,0,W,H);
  var pad={l:60,r:20,t:20,b:30};var cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  var yMax=Math.max(Math.abs(maxP),Math.abs(minP))*1.1;if(yMax===0)yMax=100000;
  var xMin=sqList[0],xMax=sqList[sqList.length-1];
  function tx(x){return pad.l+(x-xMin)/(xMax-xMin)*cw;}
  function ty(y){return pad.t+ch/2-y/yMax*ch/2;}
  cx.strokeStyle="rgba(255,255,255,0.15)";cx.setLineDash([4,4]);cx.beginPath();cx.moveTo(pad.l,ty(0));cx.lineTo(W-pad.r,ty(0));cx.stroke();cx.setLineDash([]);
  cx.strokeStyle="rgba(251,191,36,0.3)";cx.setLineDash([4,4]);cx.beginPath();cx.moveTo(tx(ATM),pad.t);cx.lineTo(tx(ATM),H-pad.b);cx.stroke();cx.setLineDash([]);
  cx.beginPath();cx.moveTo(tx(sqList[0]),ty(0));
  for(var i=0;i<pnlArr.length;i++)cx.lineTo(tx(pnlArr[i].sq),ty(pnlArr[i].total));
  cx.lineTo(tx(sqList[sqList.length-1]),ty(0));cx.closePath();
  var grd=cx.createLinearGradient(0,ty(yMax),0,ty(-yMax));grd.addColorStop(0,"rgba(74,222,128,0.15)");grd.addColorStop(0.5,"rgba(0,0,0,0)");grd.addColorStop(1,"rgba(239,68,68,0.15)");cx.fillStyle=grd;cx.fill();
  cx.strokeStyle="#818cf8";cx.lineWidth=2;cx.beginPath();
  for(var i=0;i<pnlArr.length;i++){if(i===0)cx.moveTo(tx(pnlArr[i].sq),ty(pnlArr[i].total));else cx.lineTo(tx(pnlArr[i].sq),ty(pnlArr[i].total));}
  cx.stroke();
  cx.fillStyle="#94a3b8";cx.font="10px DM Mono";cx.textAlign="center";
  for(var i=0;i<sqList.length;i+=2){cx.fillText(sqList[i].toString(),tx(sqList[i]),H-pad.b+14);}
  cx.textAlign="right";
  var ySteps=[-yMax,-yMax/2,0,yMax/2,yMax];
  for(var i=0;i<ySteps.length;i++){var yv=ySteps[i];var lbl=yv>=1e6||yv<=-1e6?(yv/1e6).toFixed(1)+"M":yv>=1e4||yv<=-1e4?(yv/1e4).toFixed(0)+"\u4e07":yv.toString();cx.fillText(lbl,pad.l-6,ty(yv)+3);}
  var tbl="<table class=\"pnl-tbl\"><tr><th style=\"text-align:left\">SQ</th>";
  for(var li=0;li<legs.length;li++){var l=legs[li];var lbl=l.type==="fut"?"FUT":(l.type==="put"?"P":"C")+l.strike+(l.side==="Short"?"S":"L");tbl+="<th>"+lbl+"</th>";}
  tbl+="<th>\u5408\u8a08P&L</th><th style=\"width:120px\">Bar</th></tr>";
  var absMax=Math.max(Math.abs(maxP),Math.abs(minP));if(absMax===0)absMax=1;
  for(var i=0;i<pnlArr.length;i++){
    var r=pnlArr[i];var isAtm=r.sq===55000||r.sq===54500;
    tbl+="<tr"+(isAtm?" class=\"atm-row\"":"")+">";
    tbl+="<td style=\"text-align:left"+(isAtm?";color:var(--atm);font-weight:700":"")+"\">"+(r.sq===55000?"\u25b6 ":"")+r.sq.toLocaleString()+"</td>";
    for(var li=0;li<r.legPnls.length;li++){var v=r.legPnls[li];var c=v>=0?"var(--up)":"var(--down)";tbl+="<td style=\"color:"+c+"\">"+(v>=0?"+":"")+v.toLocaleString()+"</td>";}
    var tc=r.total>=0?"var(--up)":"var(--down)";var tv=r.total>=1e4||r.total<=-1e4?(r.total/1e4).toFixed(1)+"\u4e07":r.total.toLocaleString();
    tbl+="<td style=\"color:"+tc+";font-weight:700\">"+(r.total>=0?"+":"")+tv+"</td>";
    var bw=Math.abs(r.total)/absMax*50;var bstyle=r.total>=0?"left:50%;width:"+bw+"%;background:var(--up)":"right:50%;width:"+bw+"%;background:var(--down)";
    tbl+="<td class=\"bar-cell\"><div class=\"bar-inner\" style=\"position:absolute;height:12px;top:50%;transform:translateY(-50%);"+bstyle+";border-radius:2px\"></div></td>";
    tbl+="</tr>";
  }
  tbl+="</table>";
  document.getElementById("pnlTable").innerHTML=tbl;
  var atmPnl=0;for(var i=0;i<pnlArr.length;i++){if(pnlArr[i].sq===55000){atmPnl=pnlArr[i].total;break;}}
  var atmStr=atmPnl>=1e4?(atmPnl/1e4).toFixed(1)+"\u4e07":atmPnl.toLocaleString();
  document.getElementById("insightBox").innerHTML="<strong>ATM(55,000)\u7740\u5730\u6642:</strong> "+(atmPnl>=0?"+":"")+atmStr+"\u5186 | <strong>Max Profit:</strong> "+maxPStr+"\u5186 | <strong>Max Loss:</strong> "+minPStr+"\u5186 | BS\u30d7\u30ec\u30df\u30a2\u30e0\u306f\u53c2\u8003\u5024\u3067\u3059\u3002\u5b9f\u969b\u306e\u7d04\u5b9a\u4fa1\u683c\u3067\u4e0a\u66f8\u304d\u3057\u3066\u304f\u3060\u3055\u3044\u3002";
}
})();
</script>
</body></html>
