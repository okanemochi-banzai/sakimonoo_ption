<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P&L Simulator | JPX 2026.03.10</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060f;--panel:#0c0c1d;--card:#111128;--border:#1e1e3a;--text:#e2e2f0;--muted:#8888aa;--accent:#818cf8;--put:#f87171;--call:#60a5fa;--atm:#fbbf24;--inc:#4ade80;--dec:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;line-height:1.6}
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,6,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;justify-content:space-between;align-items:center}
.topbar-logo{font-family:Outfit;font-weight:700;font-size:15px;color:var(--accent)}
.topbar-nav a{color:var(--muted);text-decoration:none;font-size:12px;margin-left:16px;font-family:Outfit}
.topbar-nav a:hover{color:var(--accent)}
.kpi-strip{display:flex;justify-content:center;gap:24px;padding:14px 16px;flex-wrap:wrap;background:var(--panel);border-bottom:1px solid var(--border)}
.kpi{text-align:center}.kpi-val{font-family:'DM Mono';font-size:16px;font-weight:500;color:#fff}
.kpi-label{font-size:10px;color:var(--muted);margin-top:2px}
.container{max-width:1200px;margin:0 auto;padding:16px}
.section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.section h3{font-family:Outfit;font-size:14px;font-weight:600;color:var(--accent);margin-bottom:12px}
.presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.preset-btn{padding:6px 14px;background:var(--panel);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-size:11px;font-family:'Noto Sans JP'}
.preset-btn:hover{border-color:var(--accent);color:var(--accent)}
.leg-row{display:grid;grid-template-columns:80px 80px 100px 100px 80px 80px 40px;gap:6px;align-items:center;margin-bottom:6px;font-size:11px}
.leg-row select,.leg-row input{background:var(--panel);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 6px;font-size:11px;font-family:'DM Mono'}
.leg-row input{width:100%}
.add-btns{display:flex;gap:8px;margin-top:8px}
.add-btns button{padding:5px 12px;background:var(--panel);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-size:11px}
.add-btns button:hover{border-color:var(--accent)}
.del-btn{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:4px;color:var(--dec);cursor:pointer;font-size:12px;padding:2px 8px}
.summary-strip{display:flex;gap:16px;justify-content:center;padding:12px;background:var(--panel);border-radius:8px;margin-bottom:12px}
.summary-item{text-align:center}.summary-val{font-family:'DM Mono';font-size:16px;font-weight:500}
.summary-label{font-size:10px;color:var(--muted)}
canvas{width:100%;border-radius:8px;margin-bottom:12px}
.pnl-table{width:100%;border-collapse:collapse;font-size:11px;font-family:'DM Mono'}
.pnl-table th,.pnl-table td{padding:5px 8px;border-bottom:1px solid var(--border);text-align:right}
.pnl-table th{color:var(--muted);font-weight:500;font-size:10px;text-align:center}
.pnl-table .atm-row{background:rgba(251,191,36,.06)}
.pnl-table .be-row{background:rgba(129,140,248,.06)}
.pnl-bar{display:inline-block;height:10px;border-radius:2px;vertical-align:middle}
.inc{color:var(--inc)}.dec{color:var(--dec)}
</style>
</head>
<body>
<div class="topbar">
<div class="topbar-logo">P&L Simulator</div>
<div class="topbar-nav">
<a href="index.html">← ダッシュボード</a>
<a href="archive.html">アーカイブ</a>
</div>
</div>
<div class="kpi-strip">
<div class="kpi"><div class="kpi-val">54,460</div><div class="kpi-label">ATM（先物清算値）</div></div>
<div class="kpi"><div class="kpi-val">41.3</div><div class="kpi-label">日経VI</div></div>
<div class="kpi"><div class="kpi-val">3/13(金)</div><div class="kpi-label">SQ日</div></div>
<div class="kpi"><div class="kpi-val">3日</div><div class="kpi-label">SQまで</div></div>
</div>

<div class="container">
<div class="section">
<h3>プリセット戦略</h3>
<div class="presets">
<button class="preset-btn" onclick="loadPreset('ic')">Iron Condor</button>
<button class="preset-btn" onclick="loadPreset('pcs')">Put Credit Spread</button>
<button class="preset-btn" onclick="loadPreset('ccs')">Call Credit Spread</button>
<button class="preset-btn" onclick="loadPreset('ss')">Short Strangle</button>
<button class="preset-btn" onclick="loadPreset('ph')">P売り+miniヘッジ</button>
<button class="preset-btn" onclick="loadPreset('theta')">ミニ週次θ</button>
</div>
</div>

<div class="section">
<h3>レグビルダー</h3>
<div style="font-size:10px;color:var(--muted);margin-bottom:8px">
タイプ / 売買 / 行使価格 / プレミアム(円) / 枚数 / 乗数 / 削除
</div>
<div id="legs"></div>
<div class="add-btns">
<button onclick="addLeg('P')">+ プット</button>
<button onclick="addLeg('C')">+ コール</button>
<button onclick="addLeg('F')">+ 先物mini</button>
<button onclick="clearLegs()">クリア</button>
</div>
<p style="font-size:10px;color:var(--muted);margin-top:6px">※ プレミアムはBS近似(VI=41.3, T=3日)の参考値。手入力で上書き可能。</p>
</div>

<div class="section" id="results" style="display:none">
<h3>P&L結果</h3>
<div class="summary-strip" id="summary"></div>
<canvas id="chart" height="300"></canvas>
<div style="overflow-x:auto"><table class="pnl-table" id="pnl-table"></table></div>
</div>
</div>

<script>
const ATM=54460;
const VI=0.413;
const T=3/250;
let legs=[];
let legId=0;

function normCDF(x){
  if(x<-8)return 0;if(x>8)return 1;
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const s=x>=0?1:-1;const ax=Math.abs(x);
  const t=1/(1+p*ax);
  const y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-ax*ax/2);
  return 0.5*(1+s*y);
}

function bsPrice(type,K,F,sigma,t){
  if(t<=0||sigma<=0)return Math.max(type==='P'?K-F:F-K,0);
  const st=sigma*Math.sqrt(t);
  const d1=(Math.log(F/K)+0.5*sigma*sigma*t)/st;
  const d2=d1-st;
  if(type==='P')return K*normCDF(-d2)-F*normCDF(-d1);
  return F*normCDF(d1)-K*normCDF(d2);
}

function addLeg(type,side,strike,prem,qty,mult){
  side=side||'Short';strike=strike||(type==='F'?ATM:type==='P'?ATM-2000:ATM+2000);
  qty=qty||1;mult=mult||(type==='F'?100:1000);
  if(prem===undefined&&type!=='F'){prem=Math.round(bsPrice(type,strike,ATM,VI,T));}
  if(type==='F')prem=0;
  const id=legId++;
  legs.push({id,type,side,strike,prem,qty,mult});
  renderLegs();calc();
}

function removeLeg(id){legs=legs.filter(l=>l.id!==id);renderLegs();calc();}
function clearLegs(){legs=[];renderLegs();document.getElementById('results').style.display='none';}

function renderLegs(){
  const c=document.getElementById('legs');c.innerHTML='';
  legs.forEach(l=>{
    const d=document.createElement('div');d.className='leg-row';
    d.innerHTML=`
      <select onchange="updLeg(${l.id},'type',this.value)"><option ${l.type==='P'?'selected':''}>P</option><option ${l.type==='C'?'selected':''}>C</option><option ${l.type==='F'?'selected':''}>F</option></select>
      <select onchange="updLeg(${l.id},'side',this.value)"><option ${l.side==='Short'?'selected':''}>Short</option><option ${l.side==='Long'?'selected':''}>Long</option></select>
      <input type="number" value="${l.strike}" step="500" onchange="updLeg(${l.id},'strike',+this.value)">
      <input type="number" value="${l.prem}" step="10" onchange="updLeg(${l.id},'prem',+this.value)" ${l.type==='F'?'disabled':''}>
      <input type="number" value="${l.qty}" min="1" onchange="updLeg(${l.id},'qty',+this.value)">
      <select onchange="updLeg(${l.id},'mult',+this.value)"><option value="1000" ${l.mult===1000?'selected':''}>×1000</option><option value="100" ${l.mult===100?'selected':''}>×100</option></select>
      <button class="del-btn" onclick="removeLeg(${l.id})">×</button>`;
    c.appendChild(d);
  });
}

function updLeg(id,prop,val){
  const l=legs.find(x=>x.id===id);if(!l)return;
  l[prop]=val;
  if(prop==='strike'&&l.type!=='F'){l.prem=Math.round(bsPrice(l.type,l.strike,ATM,VI,T));}
  if(prop==='type'){
    if(val==='F'){l.prem=0;l.mult=100;l.strike=ATM;}
    else{l.mult=1000;l.prem=Math.round(bsPrice(val,l.strike,ATM,VI,T));}
  }
  renderLegs();calc();
}

function calc(){
  if(legs.length===0){document.getElementById('results').style.display='none';return;}
  document.getElementById('results').style.display='block';
  const sqs=[];for(let s=ATM-6000;s<=ATM+6000;s+=500)sqs.push(s);
  const rows=sqs.map(sq=>{
    let total=0;const legPnls=[];
    legs.forEach(l=>{
      let pnl=0;
      if(l.type==='P'){
        pnl=l.side==='Short'?l.prem-Math.max(l.strike-sq,0):Math.max(l.strike-sq,0)-l.prem;
      }else if(l.type==='C'){
        pnl=l.side==='Short'?l.prem-Math.max(sq-l.strike,0):Math.max(sq-l.strike,0)-l.prem;
      }else{
        pnl=l.side==='Short'?l.strike-sq:sq-l.strike;
      }
      const yen=pnl*l.qty*l.mult;
      legPnls.push(yen);total+=yen;
    });
    return{sq,legPnls,total};
  });

  // Summary
  const maxP=Math.max(...rows.map(r=>r.total));
  const minP=Math.min(...rows.map(r=>r.total));
  const bes=[];
  for(let i=1;i<rows.length;i++){
    if((rows[i-1].total<=0&&rows[i].total>=0)||(rows[i-1].total>=0&&rows[i].total<=0)){
      bes.push(rows[i].sq);
    }
  }
  const sm=document.getElementById('summary');
  sm.innerHTML=`
    <div class="summary-item"><div class="summary-val inc">${(maxP>=0?'+':'')+(maxP/10000).toFixed(1)}万円</div><div class="summary-label">最大利益</div></div>
    <div class="summary-item"><div class="summary-val dec">${(minP/10000).toFixed(1)}万円</div><div class="summary-label">最大損失</div></div>
    <div class="summary-item"><div class="summary-val" style="color:var(--atm)">${bes.map(b=>b.toLocaleString()).join(', ')||'—'}</div><div class="summary-label">損益分岐点</div></div>`;

  // Chart
  const canvas=document.getElementById('chart');
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth*2;canvas.height=600;
  ctx.scale(2,2);
  const w=canvas.offsetWidth;const h=300;
  const pad={t:20,r:20,b:40,l:70};
  const pw=w-pad.l-pad.r;const ph=h-pad.t-pad.b;
  ctx.fillStyle='#0c0c1d';ctx.fillRect(0,0,w,h);

  const xMin=sqs[0];const xMax=sqs[sqs.length-1];
  const yMax=Math.max(Math.abs(maxP),Math.abs(minP))*1.1||1;
  const x=sq=>(sq-xMin)/(xMax-xMin)*pw+pad.l;
  const y=v=>pad.t+ph/2-v/yMax*ph/2;

  // Zero line
  ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(pad.l,y(0));ctx.lineTo(w-pad.r,y(0));ctx.stroke();
  ctx.setLineDash([]);

  // ATM line
  ctx.strokeStyle='rgba(251,191,36,.3)';ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(x(ATM),pad.t);ctx.lineTo(x(ATM),h-pad.b);ctx.stroke();
  ctx.setLineDash([]);

  // Fill areas
  ctx.beginPath();ctx.moveTo(x(rows[0].sq),y(0));
  rows.forEach(r=>ctx.lineTo(x(r.sq),y(r.total)));
  ctx.lineTo(x(rows[rows.length-1].sq),y(0));ctx.closePath();
  const grd=ctx.createLinearGradient(0,pad.t,0,h-pad.b);
  grd.addColorStop(0,'rgba(74,222,128,.15)');grd.addColorStop(0.5,'rgba(74,222,128,.02)');
  grd.addColorStop(0.5,'rgba(239,68,68,.02)');grd.addColorStop(1,'rgba(239,68,68,.15)');
  ctx.fillStyle=grd;ctx.fill();

  // P&L line
  ctx.strokeStyle='#818cf8';ctx.lineWidth=2;
  ctx.beginPath();rows.forEach((r,i)=>{i===0?ctx.moveTo(x(r.sq),y(r.total)):ctx.lineTo(x(r.sq),y(r.total))});ctx.stroke();

  // BE dots
  bes.forEach(b=>{ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(x(b),y(0),4,0,Math.PI*2);ctx.fill()});

  // Axes labels
  ctx.fillStyle='#888';ctx.font='10px DM Mono';ctx.textAlign='center';
  for(let s=xMin;s<=xMax;s+=2000){ctx.fillText(s.toLocaleString(),x(s),h-pad.b+15)}
  ctx.textAlign='right';
  const steps=5;for(let i=0;i<=steps;i++){
    const v=-yMax+2*yMax*i/steps;
    ctx.fillText((v/10000).toFixed(0)+'万',pad.l-8,y(v)+4);
  }

  // Table
  const tbl=document.getElementById('pnl-table');
  let th='<thead><tr><th>SQ着地</th>';
  legs.forEach((l,i)=>th+=`<th>${l.type}${l.strike.toLocaleString()}${l.side[0]}×${l.qty}</th>`);
  th+='<th>合計P&L</th><th>バー</th></tr></thead>';
  let tb='<tbody>';
  const absMax=Math.max(...rows.map(r=>Math.abs(r.total)))||1;
  rows.forEach(r=>{
    const isAtm=Math.abs(r.sq-ATM)<=250;
    const isBe=bes.includes(r.sq);
    const cls=isAtm?'atm-row':isBe?'be-row':'';
    tb+=`<tr class="${cls}"><td style="text-align:left">${r.sq.toLocaleString()}</td>`;
    r.legPnls.forEach(p=>{
      const c=p>=0?'inc':'dec';
      tb+=`<td class="${c}">${(p/10000).toFixed(1)}</td>`;
    });
    const tc=r.total>=0?'inc':'dec';
    const bw=Math.round(Math.abs(r.total)/absMax*60);
    const bc=r.total>=0?'var(--inc)':'var(--dec)';
    tb+=`<td class="${tc}" style="font-weight:600">${(r.total/10000).toFixed(1)}万</td>`;
    tb+=`<td><div class="pnl-bar" style="width:${bw}px;background:${bc}"></div></td></tr>`;
  });
  tb+='</tbody>';
  tbl.innerHTML=th+tb;
}

const presets={
  ic:[{type:'P',side:'Short',strike:50000,mult:1000},{type:'P',side:'Long',strike:49000,mult:1000},{type:'C',side:'Short',strike:58000,mult:1000},{type:'C',side:'Long',strike:59000,mult:1000}],
  pcs:[{type:'P',side:'Short',strike:51000,mult:1000},{type:'P',side:'Long',strike:49500,mult:1000}],
  ccs:[{type:'C',side:'Short',strike:57000,mult:1000},{type:'C',side:'Long',strike:59000,mult:1000}],
  ss:[{type:'P',side:'Short',strike:50000,mult:1000},{type:'C',side:'Short',strike:58000,mult:1000}],
  ph:[{type:'P',side:'Short',strike:52000,mult:1000},{type:'F',side:'Short',strike:54460,mult:100}],
  theta:[{type:'P',side:'Short',strike:52000,mult:100},{type:'C',side:'Short',strike:57000,mult:100}]
};

function loadPreset(name){
  clearLegs();
  presets[name].forEach(p=>addLeg(p.type,p.side,p.strike,undefined,1,p.mult));
}
</script>

</body>
</html>
