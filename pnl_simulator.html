<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P&L Simulator - 2026-03-13</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060f;--panel:#0c0c1d;--card:#111128;--border:#1e1e3a;--text:#e2e2f0;--muted:#8888aa;--accent:#818cf8;--red:#f87171;--green:#4ade80;--blue:#60a5fa;--yellow:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px}
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,6,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between}
.topbar .logo{font-family:Outfit;font-weight:700;font-size:15px;color:var(--accent)}
.topbar .sub{font-family:'DM Mono';font-size:10px;color:var(--muted);margin-left:8px}
.topbar nav a{color:var(--muted);text-decoration:none;font-size:12px;margin-left:16px;font-family:Outfit}
.topbar nav a:hover{color:var(--accent)}
.container{max-width:1000px;margin:0 auto;padding:16px}
.kpi-strip{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;flex:1;min-width:120px}
.kpi .label{font-size:10px;color:var(--muted);text-transform:uppercase}
.kpi .value{font-family:'DM Mono';font-size:16px;font-weight:700;margin-top:2px}
.section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.section h2{font-family:Outfit;font-size:14px;font-weight:600;margin-bottom:10px;color:var(--accent)}
.preset-grid{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.preset-btn{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:6px 12px;color:var(--text);cursor:pointer;font-size:11px;font-family:Outfit}
.preset-btn:hover{border-color:var(--accent);color:var(--accent)}
.legs{margin-bottom:12px}
.leg-row{display:flex;gap:6px;align-items:center;margin:4px 0;flex-wrap:wrap}
.leg-row select,.leg-row input{background:var(--panel);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 8px;font-size:12px;font-family:'DM Mono'}
.leg-row select{width:70px}
.leg-row input{width:80px}
.leg-row .remove{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px}
.add-btns{display:flex;gap:6px;margin-bottom:12px}
.add-btns button{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:6px 12px;color:var(--text);cursor:pointer;font-size:11px}
.add-btns button:hover{border-color:var(--accent)}
.calc-btn{background:var(--accent);border:none;border-radius:8px;padding:8px 24px;color:#fff;cursor:pointer;font-family:Outfit;font-weight:600;font-size:13px;width:100%}
.summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.summary-item{flex:1;min-width:150px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.summary-item .sl{font-size:10px;color:var(--muted)}
.summary-item .sv{font-family:'DM Mono';font-size:18px;font-weight:700;margin-top:4px}
canvas{width:100%;max-height:300px;margin:12px 0}
table.pnl{width:100%;border-collapse:collapse;font-size:11px}
table.pnl th{color:var(--muted);font-size:10px;text-transform:uppercase;padding:4px;border-bottom:1px solid var(--border);text-align:right}
table.pnl td{padding:4px;border-bottom:1px solid rgba(30,30,58,.3);text-align:right;font-family:'DM Mono'}
table.pnl .atm-row{background:rgba(251,191,36,.08)}
.pos{color:var(--green)}.neg{color:var(--red)}
.insight{background:rgba(129,140,248,.06);border:1px solid rgba(129,140,248,.15);border-radius:8px;padding:10px;margin-top:12px;font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div class="topbar">
<div class="logo">P&L Simulator<span class="sub">2026-03-13 | ATM=53,270 | VI=45.8 | SQ=4/10 | 残19日</span></div>
<nav><a href="index.html">← ダッシュボード</a><a href="archive.html">アーカイブ</a></nav>
</div>

<div class="container">
<div class="kpi-strip">
<div class="kpi"><div class="label">ATM</div><div class="value" style="color:var(--yellow)">53,270</div></div>
<div class="kpi"><div class="label">VI</div><div class="value" style="color:var(--red)">45.8</div></div>
<div class="kpi"><div class="label">次回SQ</div><div class="value">4/10</div></div>
<div class="kpi"><div class="label">残り</div><div class="value">19日</div></div>
</div>

<div class="section">
<h2>プリセット戦略</h2>
<div class="preset-grid">
<button class="preset-btn" onclick="loadPreset('ic')">Iron Condor</button>
<button class="preset-btn" onclick="loadPreset('pcs')">Put Credit Spread</button>
<button class="preset-btn" onclick="loadPreset('ccs')">Call Credit Spread</button>
<button class="preset-btn" onclick="loadPreset('strangle')">Short Strangle + ヘッジ</button>
<button class="preset-btn" onclick="loadPreset('phedge')">P売り + miniヘッジ</button>
<button class="preset-btn" onclick="loadPreset('theta')">ミニ週次θ</button>
</div>
</div>

<div class="section">
<h2>レグビルダー</h2>
<div id="legs" class="legs"></div>
<div class="add-btns">
<button onclick="addLeg('P')">+ プット</button>
<button onclick="addLeg('C')">+ コール</button>
<button onclick="addLeg('F')">+ 先物mini</button>
<button onclick="clearLegs()">クリア</button>
</div>
<button class="calc-btn" onclick="calculate()">P&L 計算</button>
</div>

<div id="results" style="display:none">
<div class="section">
<h2>サマリー</h2>
<div class="summary">
<div class="summary-item"><div class="sl">最大利益</div><div class="sv pos" id="maxProfit">-</div></div>
<div class="summary-item"><div class="sl">最大損失</div><div class="sv neg" id="maxLoss">-</div></div>
<div class="summary-item"><div class="sl">損益分岐</div><div class="sv" id="breakeven">-</div></div>
</div>
</div>

<div class="section">
<h2>P&Lチャート</h2>
<canvas id="pnlChart" height="250"></canvas>
</div>

<div class="section">
<h2>SQ着地別損益テーブル</h2>
<div style="overflow-x:auto"><table class="pnl" id="pnlTable"></table></div>
</div>

<div class="insight" id="insightBox"></div>
</div>
</div>

<script>
var ATM=53270,VI=45.8,T=0.076000,legs=[];
var MULT_L=1000,MULT_M=100;

function normCdf(x){
  if(x<-8)return 0;if(x>8)return 1;
  var a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  var s=x>=0?1:-1,xa=Math.abs(x),t=1/(1+p*xa);
  var y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-xa*xa/2);
  return 0.5*(1+s*y);
}
function bsPrice(type,K,F,sigma,T){
  if(T<=0||sigma<=0)return 0;
  var d1=(Math.log(F/K)+0.5*sigma*sigma*T)/(sigma*Math.sqrt(T));
  var d2=d1-sigma*Math.sqrt(T);
  if(type==='P')return K*normCdf(-d2)-F*normCdf(-d1);
  return F*normCdf(d1)-K*normCdf(d2);
}
function addLeg(type,dir,strike,prem,qty,mult){
  dir=dir||'S';strike=strike||ATM;prem=prem||0;qty=qty||1;mult=mult||(type==='F'?MULT_M:MULT_L);
  if(prem===0&&type!=='F')prem=Math.round(bsPrice(type,strike,ATM,VI/100,T));
  var id='leg_'+Date.now()+'_'+Math.random().toString(36).substr(2,4);
  legs.push({id:id,type:type,dir:dir,strike:strike,prem:prem,qty:qty,mult:mult});
  renderLegs();
}
function removeLeg(id){legs=legs.filter(l=>l.id!==id);renderLegs();}
function clearLegs(){legs=[];renderLegs();document.getElementById('results').style.display='none';}
function renderLegs(){
  var h='';
  legs.forEach(function(l){
    h+='<div class="leg-row">';
    h+='<select onchange="updLeg(\''+l.id+'\',\'dir\',this.value)"><option value="S"'+(l.dir==='S'?' selected':'')+'>Short</option><option value="L"'+(l.dir==='L'?' selected':'')+'>Long</option></select>';
    if(l.type==='F'){
      h+='<span style="color:var(--yellow);font-size:11px">先物mini</span>';
      h+='<input value="'+l.strike+'" onchange="updLeg(\''+l.id+'\',\'strike\',+this.value)" placeholder="エントリー">';
    }else{
      h+='<span style="color:var(--'+(l.type==='P'?'put':'call')+');font-size:11px">'+(l.type==='P'?'PUT':'CALL')+'</span>';
      h+='<input value="'+l.strike+'" onchange="updLeg(\''+l.id+'\',\'strike\',+this.value)" placeholder="行使価格">';
      h+='<input value="'+l.prem+'" onchange="updLeg(\''+l.id+'\',\'prem\',+this.value)" placeholder="プレミアム">';
    }
    h+='<input value="'+l.qty+'" style="width:50px" onchange="updLeg(\''+l.id+'\',\'qty\',+this.value)" placeholder="枚数">';
    h+='<select onchange="updLeg(\''+l.id+'\',\'mult\',+this.value)"><option value="1000"'+(l.mult===1000?' selected':'')+'>ラージ</option><option value="100"'+(l.mult===100?' selected':'')+'>ミニ</option></select>';
    h+='<button class="remove" onclick="removeLeg(\''+l.id+'\')">×</button>';
    h+='</div>';
  });
  document.getElementById('legs').innerHTML=h;
}
function updLeg(id,key,val){
  var l=legs.find(x=>x.id===id);if(!l)return;l[key]=val;
  if(key==='strike'&&l.type!=='F')l.prem=Math.round(bsPrice(l.type,l.strike,ATM,VI/100,T));
  renderLegs();
}
function loadPreset(name){
  clearLegs();
  switch(name){
    case 'ic':addLeg('P','S',48500,0,1,1000);addLeg('P','L',47000,0,1,1000);addLeg('C','S',58000,0,1,1000);addLeg('C','L',59000,0,1,1000);break;
    case 'pcs':addLeg('P','S',50000,0,1,1000);addLeg('P','L',48500,0,1,1000);break;
    case 'ccs':addLeg('C','S',56000,0,1,1000);addLeg('C','L',58000,0,1,1000);break;
    case 'strangle':addLeg('P','S',50000,0,1,1000);addLeg('C','S',56000,0,1,1000);addLeg('F','S',ATM,0,0,100);break;
    case 'phedge':addLeg('P','S',50000,0,1,1000);addLeg('F','S',51500,0,3,100);break;
    case 'theta':addLeg('P','S',51000,0,10,100);addLeg('C','S',55500,0,10,100);break;
  }
  setTimeout(calculate,100);
}
function calculate(){
  if(legs.length===0)return;
  var sqMin=ATM-6000,sqMax=ATM+6000,step=500;
  var rows=[];
  for(var sq=sqMin;sq<=sqMax;sq+=step){
    var total=0;var legPnls=[];
    legs.forEach(function(l){
      var pnl=0;
      if(l.type==='F'){pnl=(l.dir==='S'?l.strike-sq:sq-l.strike);}
      else if(l.type==='P'){var itm=Math.max(l.strike-sq,0);pnl=l.dir==='S'?l.prem-itm:itm-l.prem;}
      else{var itm=Math.max(sq-l.strike,0);pnl=l.dir==='S'?l.prem-itm:itm-l.prem;}
      var val=pnl*l.qty*l.mult;
      legPnls.push(val);total+=val;
    });
    rows.push({sq:sq,legPnls:legPnls,total:total});
  }
  var maxP=Math.max(...rows.map(r=>r.total));
  var maxL=Math.min(...rows.map(r=>r.total));
  var be=[];
  for(var i=1;i<rows.length;i++){if((rows[i-1].total<=0&&rows[i].total>0)||(rows[i-1].total>0&&rows[i].total<=0))be.push(rows[i].sq);}
  document.getElementById('maxProfit').textContent=maxP>=1e6?(maxP/1e6).toFixed(1)+'百万':(maxP/1e4).toFixed(0)+'万';
  document.getElementById('maxProfit').className='sv '+(maxP>=0?'pos':'neg');
  document.getElementById('maxLoss').textContent=maxL>=0?(maxL/1e4).toFixed(0)+'万':maxL<=-1e6?(maxL/1e6).toFixed(1)+'百万':(maxL/1e4).toFixed(0)+'万';
  document.getElementById('maxLoss').className='sv '+(maxL>=0?'pos':'neg');
  document.getElementById('breakeven').textContent=be.length?be.map(b=>b.toLocaleString()).join(' / '):'—';
  // Chart
  var canvas=document.getElementById('pnlChart');var ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth*2;canvas.height=500;ctx.scale(2,2);
  var w=canvas.offsetWidth,h=250;
  var absMax=Math.max(Math.abs(maxP),Math.abs(maxL))*1.2||1;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#0c0c1d';ctx.fillRect(0,0,w,h);
  var padL=50,padR=20,padT=20,padB=30;
  var cw=w-padL-padR,ch=h-padT-padB;
  var zeroY=padT+ch*(absMax/(2*absMax));
  // Zero line
  ctx.strokeStyle='#333';ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(padL,zeroY);ctx.lineTo(padL+cw,zeroY);ctx.stroke();ctx.setLineDash([]);
  // ATM line
  var atmX=padL+cw*((ATM-sqMin)/(sqMax-sqMin));
  ctx.strokeStyle='rgba(251,191,36,.4)';ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(atmX,padT);ctx.lineTo(atmX,padT+ch);ctx.stroke();ctx.setLineDash([]);
  // P&L curve
  ctx.beginPath();ctx.strokeStyle='#818cf8';ctx.lineWidth=2;
  rows.forEach(function(r,i){
    var x=padL+cw*(i/(rows.length-1));
    var y=padT+ch*(1-((r.total/absMax+1)/2));
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();
  // Fill
  rows.forEach(function(r,i){
    var x=padL+cw*(i/(rows.length-1));
    var y=padT+ch*(1-((r.total/absMax+1)/2));
    ctx.beginPath();ctx.moveTo(x,zeroY);ctx.lineTo(x,y);
    ctx.strokeStyle=r.total>=0?'rgba(74,222,128,.3)':'rgba(248,113,113,.3)';
    ctx.lineWidth=cw/(rows.length-1);ctx.stroke();
  });
  // Labels
  ctx.fillStyle='#8888aa';ctx.font='10px DM Mono';ctx.textAlign='center';
  for(var i=0;i<rows.length;i+=4){
    var x=padL+cw*(i/(rows.length-1));
    ctx.fillText((rows[i].sq/1000).toFixed(0)+'k',x,padT+ch+15);
  }
  ctx.textAlign='right';
  ctx.fillText('+'+Math.round(absMax/1e4)+'万',padL-4,padT+10);
  ctx.fillText(Math.round(-absMax/1e4)+'万',padL-4,padT+ch);
  ctx.fillText('0',padL-4,zeroY+4);
  // Table
  var th='<tr><th style="text-align:left">SQ着地</th>';
  legs.forEach(function(l,i){var s=l.dir+(l.type==='F'?'先物':l.type)+l.strike;th+='<th>'+s+'</th>';});
  th+='<th>合計P&L</th><th style="width:120px">バー</th></tr>';
  var tb='';
  rows.forEach(function(r){
    var cls=r.sq===ATM?' class="atm-row"':'';
    tb+='<tr'+cls+'><td style="text-align:left;font-family:DM Mono">'+r.sq.toLocaleString()+'</td>';
    r.legPnls.forEach(function(lp){var c=lp>=0?'pos':'neg';tb+='<td class="'+c+'">'+(lp/1e4).toFixed(1)+'万</td>';});
    var tc=r.total>=0?'pos':'neg';tb+='<td class="'+tc+'" style="font-weight:700">'+(r.total/1e4).toFixed(1)+'万</td>';
    var bw=Math.min(Math.abs(r.total)/absMax*50,50);var bc=r.total>=0?'var(--green)':'var(--red)';
    var bd=r.total>=0?'left':'right';
    tb+='<td><div style="width:100px;height:12px;background:rgba(255,255,255,.03);border-radius:2px;position:relative;margin:0 auto"><div style="position:absolute;'+bd+':50%;width:'+bw+'%;height:100%;background:'+bc+';opacity:.6;border-radius:2px"></div></div></td>';
    tb+='</tr>';
  });
  document.getElementById('pnlTable').innerHTML=th+tb;
  // Insight
  var atmRow=rows.find(r=>r.sq===ATM);
  var ins='ATM(0)着地時P&L: 1万円'.replace('{0}',ATM.toLocaleString()).replace('{1}',atmRow?(atmRow.total/1e4).toFixed(1):'—');
  document.getElementById('insightBox').innerHTML='<b>📊 シナリオ</b>: '+ins+'<br>※ BSプレミアムは参考値。実約定価格で上書き推奨。';
  document.getElementById('results').style.display='block';
}
</script>
</body>
</html>
