<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P&L Simulator - 2026/03/19</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06060f;--panel:#0c0c1d;--card:#111128;--border:#1e1e3a;--text:#e2e2f0;--dim:#8888aa;--accent:#818cf8;--red:#f87171;--green:#4ade80;--blue:#60a5fa;--gold:#fbbf24}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,6,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar .logo{font-family:Outfit;font-weight:700;font-size:16px;color:var(--accent)}
.topbar .sub{font-family:'DM Mono';font-size:11px;color:var(--dim);margin-left:12px}
.topbar nav a{font-family:Outfit;font-size:13px;color:var(--dim);text-decoration:none;margin-left:18px}
.topbar nav a:hover{color:var(--accent)}
.kpi-strip{display:flex;justify-content:center;gap:20px;padding:16px 20px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.kpi{text-align:center}
.kpi .label{font-size:10px;color:var(--dim);font-family:Outfit}
.kpi .val{font-family:'DM Mono';font-size:16px;font-weight:500;color:#fff}
.section{max-width:1100px;margin:0 auto;padding:16px}
.section-title{font-family:Outfit;font-size:15px;font-weight:600;color:#fff;margin-bottom:10px}
.presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.presets button{font-family:Outfit;font-size:12px;padding:6px 14px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;transition:all .2s}
.presets button:hover{border-color:var(--accent);color:var(--accent)}
.leg-area{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px}
.add-btns{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.add-btns button{font-family:Outfit;font-size:12px;padding:5px 12px;background:rgba(129,140,248,.1);border:1px solid var(--accent);border-radius:6px;color:var(--accent);cursor:pointer}
.add-btns button.clr{background:rgba(248,113,113,.1);border-color:var(--red);color:var(--red)}
.leg-row{display:grid;grid-template-columns:80px 70px 90px 80px 60px 60px 30px;gap:6px;align-items:center;margin:6px 0;font-size:12px}
.leg-row select,.leg-row input{font-family:'DM Mono';font-size:12px;padding:4px 6px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);width:100%}
.leg-row .del{cursor:pointer;color:var(--red);font-size:14px;text-align:center}
.results{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.sum-strip{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.sum-item{background:var(--card);border-radius:8px;padding:8px 14px;min-width:120px}
.sum-item .sl{font-size:10px;color:var(--dim);font-family:Outfit}
.sum-item .sv{font-family:'DM Mono';font-size:16px;font-weight:600}
canvas{width:100%;height:300px;display:block;margin:12px 0}
table.pnl{width:100%;border-collapse:collapse;font-size:11px;margin-top:12px}
table.pnl th{font-family:Outfit;font-size:10px;color:var(--dim);text-align:left;padding:4px 6px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel)}
table.pnl td{padding:3px 6px;border-bottom:1px solid rgba(30,30,58,.3);font-family:'DM Mono'}
table.pnl tr.atm{background:rgba(251,191,36,.06)}
.up{color:var(--green)}.dn{color:var(--red)}
.pnl-bar{height:8px;border-radius:4px;display:inline-block;vertical-align:middle}
@media(max-width:768px){.leg-row{grid-template-columns:1fr 1fr;font-size:11px}}
</style>
</head>
<body>
<div class="topbar">
<div><span class="logo">P&L Simulator</span><span class="sub">2026.03.19 | ATM 52,990 | VI 39.05 | SQ Jun 6/12 (57d)</span></div>
<nav>
<a href="index.html">&larr; Dashboard</a>
<a href="archive.html">Archive</a>
</nav>
</div>

<div class="kpi-strip">
<div class="kpi"><div class="label">ATM</div><div class="val">52,990</div></div>
<div class="kpi"><div class="label">VI</div><div class="val">39.05</div></div>
<div class="kpi"><div class="label">SQ</div><div class="val">Jun 6/12</div></div>
<div class="kpi"><div class="label">Days</div><div class="val">57</div></div>
</div>

<div class="section">
<div class="section-title">Presets</div>
<div class="presets">
<button onclick="preset('ic')">Iron Condor</button>
<button onclick="preset('pcs')">Put Credit Spread</button>
<button onclick="preset('ccs')">Call Credit Spread</button>
<button onclick="preset('ss')">Short Strangle</button>
<button onclick="preset('ph')">P売+mini Hedge</button>
<button onclick="preset('wt')">Mini Weekly &theta;</button>
</div>

<div class="section-title">Leg Builder</div>
<div class="leg-area">
<div class="add-btns">
<button onclick="addLeg('P')">+ Put</button>
<button onclick="addLeg('C')">+ Call</button>
<button onclick="addLeg('F')">+ mini Futures</button>
<button class="clr" onclick="clearLegs()">Clear</button>
</div>
<div id="legs">
<div style="font-size:11px;color:var(--dim);display:grid;grid-template-columns:80px 70px 90px 80px 60px 60px 30px;gap:6px;padding:0 0 4px">
<span>Type</span><span>Side</span><span>Strike/Entry</span><span>Premium</span><span>Qty</span><span>Multi</span><span></span>
</div>
</div>
</div>

<div class="results" id="results" style="display:none">
<div class="section-title">Results</div>
<div class="sum-strip" id="summary"></div>
<canvas id="chart" width="1000" height="300"></canvas>
<div style="max-height:400px;overflow-y:auto">
<table class="pnl" id="pnltable"></table>
</div>
</div>
</div>

<script>
var ATM=52990,VI=39.05,T=57/250,legs=[];
var legId=0;

function normCDF(x){
var t=1/(1+0.2316419*Math.abs(x));
var d=0.3989422804*Math.exp(-x*x/2);
var p=d*t*(0.3193815+t*(-0.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));
return x>0?1-p:p;
}

function bsPrice(type,K,F,sig,t){
if(t<=0)return type==='P'?Math.max(K-F,0):Math.max(F-K,0);
var d1=(Math.log(F/K)+0.5*sig*sig*t)/(sig*Math.sqrt(t));
var d2=d1-sig*Math.sqrt(t);
if(type==='P')return K*normCDF(-d2)-F*normCDF(-d1);
return F*normCDF(d1)-K*normCDF(d2);
}

function addLeg(type){
var id=legId++;
var el=document.getElementById('legs');
var div=document.createElement('div');
div.className='leg-row';
div.id='leg-'+id;
var h='';
if(type==='F'){
h+='<select disabled><option>Futures</option></select>';
h+='<select onchange="calc()"><option value="S">Short</option><option value="L">Long</option></select>';
h+='<input type="number" value="'+ATM+'" step="5" onchange="calc()">';
h+='<input type="number" value="0" disabled>';
h+='<input type="number" value="1" min="1" onchange="calc()">';
h+='<select onchange="calc()"><option value="100">mini</option><option value="1000">Large</option></select>';
}else{
h+='<select disabled><option>'+type+'ut</option></select>';
h+='<select onchange="calc()"><option value="S">Short</option><option value="L">Long</option></select>';
var defK=type==='P'?50000:56000;
h+='<input type="number" value="'+defK+'" step="125" onchange="updatePrem(this,''+type+'');calc()">';
var prem=Math.round(bsPrice(type,defK,ATM,VI/100,T));
h+='<input type="number" value="'+prem+'" step="1" onchange="calc()">';
h+='<input type="number" value="1" min="1" onchange="calc()">';
h+='<select onchange="calc()"><option value="1000">Large</option><option value="100">mini</option></select>';
}
h+='<div class="del" onclick="removeLeg('+id+')">&#x2715;</div>';
div.innerHTML=h;
div.dataset.type=type;
el.appendChild(div);
legs.push(id);
calc();
}

function updatePrem(inp,type){
var row=inp.parentNode;
var K=parseFloat(inp.value);
var p=Math.round(bsPrice(type,K,ATM,VI/100,T));
row.children[3].value=p;
}

function removeLeg(id){
var el=document.getElementById('leg-'+id);
if(el)el.remove();
legs=legs.filter(function(x){return x!==id;});
calc();
}

function clearLegs(){
var el=document.getElementById('legs');
var rows=el.querySelectorAll('.leg-row');
for(var i=0;i<rows.length;i++)rows[i].remove();
legs=[];
document.getElementById('results').style.display='none';
}

function calc(){
var rows=document.querySelectorAll('.leg-row');
if(rows.length===0){document.getElementById('results').style.display='none';return;}
document.getElementById('results').style.display='block';
var legData=[];
for(var i=0;i<rows.length;i++){
var r=rows[i];
var type=r.dataset.type;
var side=r.children[1].value;
var strike=parseFloat(r.children[2].value);
var prem=parseFloat(r.children[3].value);
var qty=parseInt(r.children[4].value)||1;
var multi=parseInt(r.children[5].value);
legData.push({type:type,side:side,strike:strike,prem:prem,qty:qty,multi:multi});
}
var sqMin=ATM-6000,sqMax=ATM+6000,step=500;
var results=[];
var maxP=-Infinity,minP=Infinity,bePoints=[];
for(var sq=sqMin;sq<=sqMax;sq+=step){
var total=0;
var legPnls=[];
for(var j=0;j<legData.length;j++){
var L=legData[j];
var pnl=0;
if(L.type==='F'){
pnl=(L.side==='S')?(L.strike-sq):(sq-L.strike);
}else if(L.type==='P'){
if(L.side==='S')pnl=L.prem-Math.max(L.strike-sq,0);
else pnl=Math.max(L.strike-sq,0)-L.prem;
}else{
if(L.side==='S')pnl=L.prem-Math.max(sq-L.strike,0);
else pnl=Math.max(sq-L.strike,0)-L.prem;
}
var yen=pnl*L.qty*L.multi;
legPnls.push(yen);
total+=yen;
}
results.push({sq:sq,legs:legPnls,total:total});
if(total>maxP)maxP=total;
if(total<minP)minP=total;
}
for(var k=1;k<results.length;k++){
if((results[k-1].total<=0&&results[k].total>0)||(results[k-1].total>0&&results[k].total<=0)){
bePoints.push(results[k].sq);
}
}
var sumH='';
sumH+='<div class="sum-item"><div class="sl">Max Profit</div><div class="sv up">'+fmtYen(maxP)+'</div></div>';
sumH+='<div class="sum-item"><div class="sl">Max Loss</div><div class="sv dn">'+fmtYen(minP)+'</div></div>';
var beStr=bePoints.length>0?bePoints.map(function(x){return x.toLocaleString();}).join(', '):'-';
sumH+='<div class="sum-item"><div class="sl">B/E</div><div class="sv">'+beStr+'</div></div>';
document.getElementById('summary').innerHTML=sumH;
drawChart(results,maxP,minP,bePoints);
drawTable(results,legData);
}

function fmtYen(v){
if(Math.abs(v)>=10000)return (v/10000).toFixed(1)+'\u4e07';
return v.toLocaleString()+'\u5186';
}

function drawChart(data,maxP,minP,bePts){
var c=document.getElementById('chart');
var ctx=c.getContext('2d');
var W=c.width,H=c.height;
ctx.clearRect(0,0,W,H);
var pad={l:60,r:20,t:20,b:40};
var pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;
var range=Math.max(Math.abs(maxP),Math.abs(minP))*1.1;
if(range===0)range=1;
function x2px(sq){return pad.l+(sq-data[0].sq)/(data[data.length-1].sq-data[0].sq)*pw;}
function y2px(v){return pad.t+ph/2-v/range*(ph/2);}
ctx.strokeStyle='rgba(255,255,255,.08)';
ctx.lineWidth=1;
ctx.setLineDash([4,4]);
ctx.beginPath();ctx.moveTo(pad.l,y2px(0));ctx.lineTo(W-pad.r,y2px(0));ctx.stroke();
ctx.strokeStyle='rgba(251,191,36,.3)';
ctx.beginPath();ctx.moveTo(x2px(ATM),pad.t);ctx.lineTo(x2px(ATM),H-pad.b);ctx.stroke();
ctx.setLineDash([]);
ctx.beginPath();
for(var i=0;i<data.length;i++){
var px=x2px(data[i].sq),py=y2px(data[i].total);
if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
}
ctx.strokeStyle='#818cf8';ctx.lineWidth=2;ctx.stroke();
for(var i=0;i<data.length;i++){
var px=x2px(data[i].sq),py=y2px(data[i].total);
var zy=y2px(0);
ctx.fillStyle=data[i].total>=0?'rgba(74,222,128,.1)':'rgba(248,113,113,.1)';
ctx.fillRect(px-pw/data.length/2,Math.min(py,zy),pw/data.length,Math.abs(py-zy));
}
ctx.fillStyle='var(--dim)';ctx.font='10px DM Mono';ctx.textAlign='center';
for(var i=0;i<data.length;i+=2){
ctx.fillStyle='#8888aa';
ctx.fillText((data[i].sq/1000)+'K',x2px(data[i].sq),H-pad.b+14);
}
ctx.textAlign='right';
var steps=[maxP,maxP/2,0,-Math.abs(minP)/2,minP];
for(var i=0;i<steps.length;i++){
ctx.fillStyle='#8888aa';
ctx.fillText(fmtYen(Math.round(steps[i])),pad.l-4,y2px(steps[i])+3);
}
}

function drawTable(data,legData){
var t=document.getElementById('pnltable');
var h='<thead><tr><th>SQ</th>';
for(var j=0;j<legData.length;j++){
var L=legData[j];
var lbl=(L.side==='S'?'S':'L')+' ';
if(L.type==='F')lbl+='Fut '+L.strike;
else lbl+=L.type+(L.strike/1000)+'K';
h+='<th>'+lbl+'</th>';
}
h+='<th>Total</th><th style="width:100px">Bar</th></tr></thead><tbody>';
var absMax=0;
for(var i=0;i<data.length;i++){if(Math.abs(data[i].total)>absMax)absMax=Math.abs(data[i].total);}
if(absMax===0)absMax=1;
for(var i=0;i<data.length;i++){
var d=data[i];
var isATM=Math.abs(d.sq-ATM)<250;
h+='<tr'+(isATM?' class="atm"':'')+'>';
h+='<td>'+(d.sq).toLocaleString()+'</td>';
for(var j=0;j<d.legs.length;j++){
var cls=d.legs[j]>=0?'up':'dn';
h+='<td class="'+cls+'">'+d.legs[j].toLocaleString()+'</td>';
}
var tcls=d.total>=0?'up':'dn';
h+='<td class="'+tcls+'" style="font-weight:600">'+fmtYen(d.total)+'</td>';
var bw=Math.round(Math.abs(d.total)/absMax*80);
var bc=d.total>=0?'var(--green)':'var(--red)';
h+='<td><span class="pnl-bar" style="width:'+bw+'px;background:'+bc+'"></span></td>';
h+='</tr>';
}
h+='</tbody>';
t.innerHTML=h;
}

function preset(name){
clearLegs();
if(name==='ic'){
addLegDirect('P','S',50000,1,1000);
addLegDirect('P','L',48000,1,1000);
addLegDirect('C','S',56000,1,1000);
addLegDirect('C','L',58000,1,1000);
}else if(name==='pcs'){
addLegDirect('P','S',50000,1,1000);
addLegDirect('P','L',48000,1,1000);
}else if(name==='ccs'){
addLegDirect('C','S',56000,1,1000);
addLegDirect('C','L',58000,1,1000);
}else if(name==='ss'){
addLegDirect('P','S',50000,1,1000);
addLegDirect('C','S',56000,1,1000);
}else if(name==='ph'){
addLegDirect('P','S',50000,1,1000);
addLegDirect('F','S',ATM,1,100);
}else if(name==='wt'){
addLegDirect('P','S',51000,10,100);
addLegDirect('C','S',55000,10,100);
}
}

function addLegDirect(type,side,strike,qty,multi){
var id=legId++;
var el=document.getElementById('legs');
var div=document.createElement('div');
div.className='leg-row';
div.id='leg-'+id;
div.dataset.type=type;
var h='';
if(type==='F'){
h+='<select disabled><option>Futures</option></select>';
h+='<select onchange="calc()"><option value="S"'+(side==='S'?' selected':'')+'>Short</option><option value="L"'+(side==='L'?' selected':'')+'>Long</option></select>';
h+='<input type="number" value="'+strike+'" step="5" onchange="calc()">';
h+='<input type="number" value="0" disabled>';
h+='<input type="number" value="'+qty+'" min="1" onchange="calc()">';
h+='<select onchange="calc()"><option value="100"'+(multi===100?' selected':'')+'>mini</option><option value="1000"'+(multi===1000?' selected':'')+'>Large</option></select>';
}else{
var tname=type==='P'?'Put':'Call';
h+='<select disabled><option>'+tname+'</option></select>';
h+='<select onchange="calc()"><option value="S"'+(side==='S'?' selected':'')+'>Short</option><option value="L"'+(side==='L'?' selected':'')+'>Long</option></select>';
h+='<input type="number" value="'+strike+'" step="125" onchange="updatePrem(this,\''+type+'\');calc()">';
var prem=Math.round(bsPrice(type,strike,ATM,VI/100,T));
h+='<input type="number" value="'+prem+'" step="1" onchange="calc()">';
h+='<input type="number" value="'+qty+'" min="1" onchange="calc()">';
h+='<select onchange="calc()"><option value="1000"'+(multi===1000?' selected':'')+'>Large</option><option value="100"'+(multi===100?' selected':'')+'>mini</option></select>';
}
h+='<div class="del" onclick="removeLeg('+id+')">&#x2715;</div>';
div.innerHTML=h;
el.appendChild(div);
legs.push(id);
calc();
}
</script>
</body>
</html>
