<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P&L Simulator — 2026年3月11日（水）</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060f;--panel:#0c0c1d;--card:#111128;--border:#1e1e3a;--text:#e2e2f0;--dim:#8888aa;--accent:#818cf8;--red:#f87171;--green:#4ade80;--blue:#60a5fa;--yellow:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;line-height:1.6}
a{color:var(--accent);text-decoration:none}
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,6,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar .logo{font-family:Outfit;font-weight:700;font-size:15px;color:var(--accent)}
.topbar .sub{color:var(--dim);font-size:10px;margin-left:10px}
.topbar nav a{margin-left:16px;font-size:12px;color:var(--dim)}
.kpi-strip{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;padding:12px 16px;border-bottom:1px solid var(--border)}
.kpi{text-align:center}.kpi .label{font-size:10px;color:var(--dim)}.kpi .value{font-family:'DM Mono';font-size:16px;color:#fff}
.container{max-width:1000px;margin:0 auto;padding:16px}
.section{margin:16px 0}
.section h2{font-family:Outfit;font-size:15px;font-weight:600;color:#fff;margin-bottom:10px}
.presets{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.preset-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'Noto Sans JP'}
.preset-btn:hover{border-color:var(--accent);color:var(--accent)}
.preset-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.leg-builder{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin:10px 0}
.leg-row{display:flex;align-items:center;gap:6px;margin:4px 0;flex-wrap:wrap}
.leg-row select,.leg-row input{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:11px;font-family:'DM Mono'}
.leg-row select{width:80px}.leg-row input{width:80px}
.leg-row .rm{background:var(--red);color:#fff;border:none;width:22px;height:22px;border-radius:4px;cursor:pointer;font-size:12px}
.add-btns{display:flex;gap:6px;margin:8px 0}
.add-btn{background:rgba(129,140,248,.1);border:1px solid var(--accent);color:var(--accent);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px}
.add-btn:hover{background:var(--accent);color:#fff}
.result-strip{display:flex;gap:16px;flex-wrap:wrap;margin:10px 0;padding:10px;background:var(--card);border-radius:8px}
.result-kpi{text-align:center;flex:1;min-width:120px}
.result-kpi .rl{font-size:10px;color:var(--dim)}.result-kpi .rv{font-family:'DM Mono';font-size:18px}
canvas{width:100%;max-width:900px;display:block;margin:12px auto;border-radius:8px}
table.pnl{width:100%;border-collapse:collapse;font-size:11px;margin:10px 0}
table.pnl th{background:rgba(129,140,248,.08);color:var(--dim);font-weight:500;padding:4px 6px;text-align:right;font-size:10px;border-bottom:1px solid var(--border)}
table.pnl td{padding:3px 6px;border-bottom:1px solid rgba(30,30,58,.5);font-family:'DM Mono';font-size:10px;text-align:right}
table.pnl .atm-row{background:rgba(251,191,36,.06)}
table.pnl .be-row{background:rgba(129,140,248,.06)}
.pnl-bar-cell{display:flex;align-items:center;gap:2px}
.pnl-bar{height:10px;border-radius:2px}
.insight-box{background:rgba(129,140,248,.06);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:10px 12px;margin:12px 0;font-size:12px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">P&L Simulator</div>
  <div class="sub">2026年3月11日（水） | ATM 55,200 | VI 35.05 | SQ残2日</div>
  <nav>
    <a href="index.html">← ダッシュボード</a>
    <a href="archive.html">アーカイブ</a>
  </nav>
</div>

<div class="kpi-strip">
  <div class="kpi"><div class="label">ATM</div><div class="value">55,200</div></div>
  <div class="kpi"><div class="label">日経VI</div><div class="value">35.05</div></div>
  <div class="kpi"><div class="label">SQ日付</div><div class="value">2026/3/13</div></div>
  <div class="kpi"><div class="label">残り営業日</div><div class="value">2</div></div>
</div>

<div class="container">

<div class="section">
<h2>プリセット戦略</h2>
<div class="presets" id="presets"></div>
</div>

<div class="section">
<h2>レグビルダー</h2>
<div class="add-btns">
  <button class="add-btn" onclick="addLeg('put')">+ プット</button>
  <button class="add-btn" onclick="addLeg('call')">+ コール</button>
  <button class="add-btn" onclick="addLeg('fut')">+ 先物mini</button>
  <button class="add-btn" onclick="clearLegs()" style="background:rgba(248,113,113,.1);border-color:var(--red);color:var(--red)">クリア</button>
</div>
<div class="leg-builder" id="legs"></div>
<div style="font-size:10px;color:var(--dim);margin-top:4px">※ プレミアムはBS近似値（参考）。手入力で上書き可能。</div>
</div>

<div class="section" id="results" style="display:none">
<h2>P&L結果</h2>
<div class="result-strip" id="summary"></div>
<canvas id="chart" width="900" height="350"></canvas>
<div id="pnl-table"></div>
<div class="insight-box" id="insight-box"></div>
</div>

</div>

<script>
var ATM=55200,VI=35.05,T=2/250;
var legs=[];
var presets=[
  {name:'Iron Condor',legs:[{t:'put',sd:'S',k:52000,m:1000,q:1},{t:'put',sd:'L',k:50000,m:1000,q:1},{t:'call',sd:'S',k:58000,m:1000,q:1},{t:'call',sd:'L',k:60000,m:1000,q:1}]},
  {name:'Put Credit',legs:[{t:'put',sd:'S',k:52000,m:1000,q:1},{t:'put',sd:'L',k:50000,m:1000,q:1}]},
  {name:'Call Credit',legs:[{t:'call',sd:'S',k:58000,m:1000,q:1},{t:'call',sd:'L',k:60000,m:1000,q:1}]},
  {name:'Strangle+ヘッジ',legs:[{t:'put',sd:'S',k:53000,m:1000,q:1},{t:'call',sd:'S',k:57000,m:1000,q:1},{t:'fut',sd:'S',k:ATM,m:100,q:0}]},
  {name:'P売+miniヘッジ',legs:[{t:'put',sd:'S',k:54000,m:1000,q:1},{t:'fut',sd:'S',k:ATM,m:100,q:0}]},
  {name:'ミニ週次θ',legs:[{t:'put',sd:'S',k:53000,m:100,q:1},{t:'call',sd:'S',k:57000,m:100,q:1}]}
];

function normCDF(x){var a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;var s=x>=0?1:-1;x=Math.abs(x);var t=1/(1+p*x);var y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x/2);return 0.5*(1+s*y)}

function bsPrice(type,K,F,sig,T){
  if(T<=0)return type=='put'?Math.max(K-F,0):Math.max(F-K,0);
  var sqT=Math.sqrt(T);var d1=(Math.log(F/K)+0.5*sig*sig*T)/(sig*sqT);var d2=d1-sig*sqT;
  if(type=='put')return K*normCDF(-d2)-F*normCDF(-d1);
  return F*normCDF(d1)-K*normCDF(d2);
}

function initPresets(){
  var el=document.getElementById('presets');
  presets.forEach(function(p,i){
    var b=document.createElement('button');b.className='preset-btn';b.textContent=p.name;
    b.onclick=function(){loadPreset(i);document.querySelectorAll('.preset-btn').forEach(function(x){x.classList.remove('active')});b.classList.add('active')};
    el.appendChild(b);
  });
}

function loadPreset(idx){
  legs=[];
  presets[idx].legs.forEach(function(l){
    var prem=0;
    if(l.t!='fut')prem=Math.round(bsPrice(l.t,l.k,ATM,VI/100,T));
    legs.push({type:l.t,side:l.sd,strike:l.k,prem:prem,qty:l.q,mult:l.m});
  });
  renderLegs();calc();
}

function addLeg(type){
  var k=type=='fut'?ATM:(type=='put'?ATM-2000:ATM+2000);
  var m=1000;var prem=0;
  if(type!='fut')prem=Math.round(bsPrice(type,k,ATM,VI/100,T));
  legs.push({type:type,side:'S',strike:k,prem:prem,qty:1,mult:m});
  renderLegs();calc();
}

function removeLeg(i){legs.splice(i,1);renderLegs();calc()}
function clearLegs(){legs=[];renderLegs();document.getElementById('results').style.display='none';document.querySelectorAll('.preset-btn').forEach(function(x){x.classList.remove('active')})}

function renderLegs(){
  var el=document.getElementById('legs');var h='';
  legs.forEach(function(l,i){
    var label=l.type=='put'?'プット':l.type=='call'?'コール':'先物';
    h+='<div class="leg-row">';
    h+='<span style="color:'+(l.type=='put'?'var(--red)':l.type=='call'?'var(--blue)':'var(--yellow)')+';font-size:11px;width:50px">'+label+'</span>';
    h+='<select onchange="legs['+i+'].side=this.value;calc()"><option value="S"'+(l.side=='S'?' selected':'')+'>Short</option><option value="L"'+(l.side=='L'?' selected':'')+'>Long</option></select>';
    h+='<label style="font-size:10px;color:var(--dim)">'+(l.type=='fut'?'Entry':'K')+'</label><input type="number" value="'+l.strike+'" step="500" onchange="updateStrike('+i+',this.value)">';
    if(l.type!='fut')h+='<label style="font-size:10px;color:var(--dim)">Prem</label><input type="number" value="'+l.prem+'" step="10" onchange="legs['+i+'].prem=+this.value;calc()">';
    h+='<label style="font-size:10px;color:var(--dim)">枚数</label><input type="number" value="'+l.qty+'" min="0" step="1" style="width:50px" onchange="legs['+i+'].qty=+this.value;calc()">';
    h+='<select onchange="legs['+i+'].mult=+this.value;calc()"><option value="1000"'+(l.mult==1000?' selected':'')+'>ラージ×1000</option><option value="100"'+(l.mult==100?' selected':'')+'>ミニ×100</option></select>';
    h+='<button class="rm" onclick="removeLeg('+i+')">×</button>';
    h+='</div>';
  });
  if(!legs.length)h='<div style="color:var(--dim);text-align:center;padding:16px">レグを追加するか、プリセットを選択してください</div>';
  el.innerHTML=h;
}

function updateStrike(i,v){
  legs[i].strike=+v;
  if(legs[i].type!='fut')legs[i].prem=Math.round(bsPrice(legs[i].type,+v,ATM,VI/100,T));
  renderLegs();calc();
}

function calc(){
  if(!legs.length||legs.every(function(l){return l.qty==0})){document.getElementById('results').style.display='none';return}
  document.getElementById('results').style.display='block';
  var sqPrices=[];for(var s=ATM-6000;s<=ATM+6000;s+=500)sqPrices.push(s);
  var pnlData=sqPrices.map(function(sq){
    var total=0;
    var legPnls=legs.map(function(l){
      var pnl=0;
      if(l.type=='put'){
        pnl=l.side=='S'?(l.prem-Math.max(l.strike-sq,0)):(Math.max(l.strike-sq,0)-l.prem);
      }else if(l.type=='call'){
        pnl=l.side=='S'?(l.prem-Math.max(sq-l.strike,0)):(Math.max(sq-l.strike,0)-l.prem);
      }else{
        pnl=l.side=='S'?(l.strike-sq):(sq-l.strike);
      }
      var yen=pnl*l.qty*l.mult;total+=yen;return{pts:pnl,yen:yen};
    });
    return{sq:sq,legPnls:legPnls,total:total};
  });

  var maxP=Math.max.apply(null,pnlData.map(function(d){return d.total}));
  var minP=Math.min.apply(null,pnlData.map(function(d){return d.total}));
  var bes=[];
  for(var i=1;i<pnlData.length;i++){
    if((pnlData[i-1].total<=0&&pnlData[i].total>0)||(pnlData[i-1].total>=0&&pnlData[i].total<0)){
      var r=pnlData[i-1].total/(pnlData[i-1].total-pnlData[i].total);
      bes.push(Math.round(pnlData[i-1].sq+r*500));
    }
  }

  // Summary
  var sumEl=document.getElementById('summary');
  sumEl.innerHTML='<div class="result-kpi"><div class="rl">最大利益</div><div class="rv" style="color:var(--green)">'+(maxP>=0?'+':'')+Math.round(maxP).toLocaleString()+'円</div></div>'+
    '<div class="result-kpi"><div class="rl">最大損失</div><div class="rv" style="color:var(--red)">'+Math.round(minP).toLocaleString()+'円</div></div>'+
    '<div class="result-kpi"><div class="rl">損益分岐</div><div class="rv" style="color:var(--yellow)">'+bes.map(function(b){return b.toLocaleString()}).join(' / ')+'</div></div>';

  // Chart
  drawChart(pnlData,bes);

  // Table
  var tEl=document.getElementById('pnl-table');
  var th='<table class="pnl"><tr><th style="text-align:left">SQ着地</th>';
  legs.forEach(function(l,i){
    var label=(l.type=='put'?'P':l.type=='call'?'C':'F')+l.strike.toLocaleString()+(l.side=='S'?'売':'買')+'×'+l.qty;
    th+='<th>'+label+'</th>';
  });
  th+='<th>合計P&L</th><th style="width:100px">バー</th></tr>';

  var absMax=Math.max(Math.abs(maxP),Math.abs(minP))||1;
  pnlData.forEach(function(d){
    var isAtm=d.sq==ATM,isBe=bes.some(function(b){return Math.abs(b-d.sq)<300});
    var cls=isAtm?' class="atm-row"':(isBe?' class="be-row"':'');
    th+='<tr'+cls+'><td style="text-align:left;'+(isAtm?'color:var(--yellow);font-weight:700':'')+'">'+d.sq.toLocaleString()+'</td>';
    d.legPnls.forEach(function(lp){
      var c=lp.yen>=0?'var(--green)':'var(--red)';
      th+='<td style="color:'+c+'">'+Math.round(lp.yen).toLocaleString()+'</td>';
    });
    var tc=d.total>=0?'var(--green)':'var(--red)';
    th+='<td style="color:'+tc+';font-weight:700">'+Math.round(d.total).toLocaleString()+'</td>';
    var bw=Math.round(Math.abs(d.total)/absMax*60);
    var bc=d.total>=0?'var(--green)':'var(--red)';
    var bdir=d.total>=0?'margin-left:50%':'margin-left:calc(50% - '+bw+'px)';
    th+='<td><div style="width:100px;height:10px;position:relative"><div style="position:absolute;left:50%;top:0;width:1px;height:10px;background:var(--border)"></div><div class="pnl-bar" style="width:'+bw+'px;background:'+bc+';'+bdir+';position:absolute;top:0"></div></div></td>';
    th+='</tr>';
  });
  th+='</table>';
  tEl.innerHTML=th;

  // Insight
  var atmPnl=pnlData.find(function(d){return d.sq==ATM});
  var iEl=document.getElementById('insight-box');
  iEl.innerHTML='ATM('+ATM.toLocaleString()+')着地時: <b style="color:'+(atmPnl.total>=0?'var(--green)':'var(--red)')+'">'+(atmPnl.total>=0?'+':'')+Math.round(atmPnl.total).toLocaleString()+'円</b>';
}

function drawChart(data,bes){
  var canvas=document.getElementById('chart');var ctx=canvas.getContext('2d');
  var W=canvas.width=900,H=canvas.height=350;
  var pad={l:60,r:20,t:20,b:40};
  var cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  ctx.fillStyle='#0c0c1d';ctx.fillRect(0,0,W,H);

  var vals=data.map(function(d){return d.total});
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
  var range=Math.max(Math.abs(mn),Math.abs(mx))||1;mn=-range;mx=range;

  function x(i){return pad.l+i/(data.length-1)*cW}
  function y(v){return pad.t+(1-(v-mn)/(mx-mn))*cH}
  var zeroY=y(0);

  // Grid
  ctx.strokeStyle='#1e1e3a';ctx.lineWidth=0.5;
  for(var g=-5;g<=5;g++){
    var gv=range*g/5;var gy=y(gv);
    ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(W-pad.r,gy);ctx.stroke();
    ctx.fillStyle='#666';ctx.font='10px DM Mono';ctx.textAlign='right';
    ctx.fillText(Math.round(gv).toLocaleString(),pad.l-6,gy+3);
  }

  // Zero line
  ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(pad.l,zeroY);ctx.lineTo(W-pad.r,zeroY);ctx.stroke();
  ctx.setLineDash([]);

  // ATM line
  var atmIdx=data.findIndex(function(d){return d.sq==ATM});
  if(atmIdx>=0){
    ctx.strokeStyle='rgba(251,191,36,.4)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(x(atmIdx),pad.t);ctx.lineTo(x(atmIdx),H-pad.b);ctx.stroke();
    ctx.setLineDash([]);
  }

  // Fill areas
  ctx.beginPath();ctx.moveTo(x(0),zeroY);
  for(var i=0;i<data.length;i++){ctx.lineTo(x(i),y(data[i].total))}
  ctx.lineTo(x(data.length-1),zeroY);ctx.closePath();
  var grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,'rgba(74,222,128,.15)');grad.addColorStop(0.5,'rgba(0,0,0,0)');grad.addColorStop(1,'rgba(248,113,113,.15)');
  ctx.fillStyle=grad;ctx.fill();

  // P&L line
  ctx.strokeStyle='#818cf8';ctx.lineWidth=2;ctx.beginPath();
  for(var i=0;i<data.length;i++){i==0?ctx.moveTo(x(i),y(data[i].total)):ctx.lineTo(x(i),y(data[i].total))}
  ctx.stroke();

  // X labels
  ctx.fillStyle='#666';ctx.font='9px DM Mono';ctx.textAlign='center';
  for(var i=0;i<data.length;i+=2){
    ctx.fillText(data[i].sq.toLocaleString(),x(i),H-pad.b+14);
  }

  // BE dots
  ctx.fillStyle='var(--yellow)';
  bes.forEach(function(b){
    var bi=data.findIndex(function(d){return Math.abs(d.sq-b)<300});
    if(bi>=0){ctx.beginPath();ctx.arc(x(bi),y(0),4,0,Math.PI*2);ctx.fillStyle='#fbbf24';ctx.fill()}
  });
}

initPresets();renderLegs();
</script>
</body>
</html>
